name: webofdevs

services:
  postgres:
    image: postgres:17-alpine
    container_name: webofdevs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webofdevs
      POSTGRES_PASSWORD: webofdevs
      POSTGRES_DB: webofdevs
    ports:
      - "5434:5432"
    volumes:
      - webofdevs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webofdevs"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: webofdevs-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "webofdevs"]
    ports:
      - "6380:6379"
    volumes:
      - webofdevs_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "webofdevs", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  webofdevs_postgres_data:
  webofdevs_redis_data:
